@if (open) {
  <div class="confirm-backdrop" (click)="onBackdropClick($event)" role="presentation">
    <div class="confirm-dialog" role="alertdialog" aria-modal="true" [attr.aria-labelledby]="'confirm-title'">
      <div class="confirm-icon" [class.danger]="variant === 'danger'">
        @if (variant === 'danger') {
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        }
      </div>

      <h2 id="confirm-title" class="confirm-title">{{ title }}</h2>
      <p class="confirm-message">{{ message }}</p>

      <div class="confirm-actions">
        <button type="button" class="btn-cancel" [disabled]="loading" (click)="cancel.emit()">
          {{ cancelLabel }}
        </button>
        <button
          type="button"
          class="btn-confirm"
          [class.danger]="variant === 'danger'"
          [disabled]="loading"
          (click)="confirm.emit()"
        >
          {{ loading ? 'Please wait…' : confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
