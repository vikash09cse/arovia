<div class="header">
  <h1>Platform Users</h1>
  <button (click)="toggleForm()">{{ showForm() ? 'Cancel' : 'Add User' }}</button>
</div>

@if (message()) { <div class="msg">{{ message() }}</div> }

@if (showForm()) {
  <form [formGroup]="form" (ngSubmit)="create()" class="form-card">
    <div class="grid">
      <label>Email<input formControlName="email" type="email" /></label>
      <label>First Name<input formControlName="firstName" /></label>
      <label>Last Name<input formControlName="lastName" /></label>
      <label>
        Password
        <input formControlName="password" type="password" autocomplete="new-password" />
      </label>
      <label>
        User Type
        <select formControlName="userType">
          @for (type of userTypes; track type.value) {
            <option [ngValue]="type.value">{{ type.label }}</option>
          }
        </select>
      </label>
    </div>
    <button type="submit" [disabled]="form.invalid">Create User</button>
  </form>
}

<table>
  <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
  <tbody>
    @for (u of users(); track u.id) {
      <tr>
        <td>{{ u.firstName }} {{ u.lastName }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.status }}</td>
        <td>{{ u.createdAt | date:'mediumDate' }}</td>
        <td class="actions">
          @if (u.statusCode === 1) {
            <button class="warn" (click)="setStatus(u.id, 2)">Deactivate</button>
          } @else {
            <button class="ok" (click)="setStatus(u.id, 1)">Activate</button>
          }
          <button class="delete" (click)="deleteUser(u)">Delete</button>
        </td>
      </tr>
    }
  </tbody>
</table>
